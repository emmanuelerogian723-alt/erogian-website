<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erogian Analytics</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  * { box-sizing: border-box; margin:0; padding:0; }
  body { background:#050505; color:#eaeaea; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; min-height:100vh; }
  .wrap { max-width:1100px; margin:0 auto; padding:30px 20px 80px; }
  h1 { font-size:26px; font-weight:700; margin-bottom:6px; background:linear-gradient(90deg,#3b82f6,#facc15); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .sub { color:#888; font-size:13px; margin-bottom:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:14px; margin-bottom:26px; }
  .card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.08); border-radius:14px; padding:18px; backdrop-filter:blur(10px); }
  .card .num { font-size:28px; font-weight:800; color:#fff; }
  .card .label { font-size:12px; color:#999; margin-top:4px; }
  .panel { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; margin-bottom:20px; }
  .panel h2 { font-size:15px; margin-bottom:14px; color:#facc15; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; color:#888; font-weight:600; padding:6px 8px; border-bottom:1px solid rgba(255,255,255,0.1); }
  td { padding:7px 8px; border-bottom:1px solid rgba(255,255,255,0.05); color:#ddd; }
  .pill { display:inline-block; background:rgba(59,130,246,0.15); color:#93c5fd; padding:2px 8px; border-radius:20px; font-size:11px; }
  .locked { text-align:center; padding-top:120px; }
  .locked input { background:#111; border:1px solid #333; color:#fff; padding:10px 14px; border-radius:8px; margin-top:14px; width:260px; }
  .locked button { background:#3b82f6; color:#fff; border:none; padding:10px 18px; border-radius:8px; margin-left:8px; cursor:pointer; }
  canvas { max-height:220px; }
  .err { color:#f87171; text-align:center; padding:40px; }
</style>
</head>
<body>
<div id="app" class="wrap">
  <div class="locked" id="lockScreen">
    <h1>Erogian Analytics</h1>
    <p class="sub">Enter your dashboard key to view visitor data</p>
    <div>
      <input id="keyInput" type="password" placeholder="dashboard key" />
      <button onclick="unlock()">View</button>
    </div>
  </div>
</div>

<script>
const FN_URL = 'https://superagent-3c6b0370.base44.app/functions/getErogianAnalytics';

function unlock() {
  const key = document.getElementById('keyInput').value.trim();
  if (!key) return;
  localStorage.setItem('erogian_dash_key', key);
  load(key);
}

async function load(key) {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="err">Loading...</div>';
  try {
    const res = await fetch(FN_URL + '?key=' + encodeURIComponent(key));
    if (res.status === 403) {
      app.innerHTML = `<div class="locked"><h1>Erogian Analytics</h1><p class="sub" style="color:#f87171">Wrong key. Try again.</p><div><input id="keyInput" type="password" placeholder="dashboard key" /><button onclick="unlock()">View</button></div></div>`;
      return;
    }
    const data = await res.json();
    render(data);
  } catch (e) {
    app.innerHTML = '<div class="err">Failed to load analytics: ' + e + '</div>';
  }
}

function row(name, count) {
  return `<tr><td>${name}</td><td style="text-align:right"><span class="pill">${count}</span></td></tr>`;
}

function render(d) {
  const app = document.getElementById('app');
  app.innerHTML = `
    <h1>Erogian Analytics</h1>
    <div class="sub">Live visitor data for erogian website</div>
    <div class="grid">
      <div class="card"><div class="num">${d.totalVisits}</div><div class="label">Total Page Views</div></div>
      <div class="card"><div class="num">${d.totalLeads}</div><div class="label">Leads Captured</div></div>
      <div class="card"><div class="num">${d.byReferrer.length}</div><div class="label">Traffic Sources</div></div>
      <div class="card"><div class="num">${d.byDevice.find(x=>x.name==='mobile')?.count || 0}</div><div class="label">Mobile Visits</div></div>
    </div>
    <div class="panel">
      <h2>Visits Over Time</h2>
      <canvas id="dayChart"></canvas>
    </div>
    <div class="panel">
      <h2>Top Traffic Sources (where visitors came from)</h2>
      <table><tr><th>Source</th><th style="text-align:right">Visits</th></tr>${d.byReferrer.slice(0,10).map(r=>row(r.name,r.count)).join('')}</table>
    </div>
    <div class="panel">
      <h2>Top Pages</h2>
      <table><tr><th>Page</th><th style="text-align:right">Views</th></tr>${d.byPage.slice(0,10).map(r=>row(r.name,r.count)).join('')}</table>
    </div>
    <div class="panel">
      <h2>Device Breakdown</h2>
      <table><tr><th>Device</th><th style="text-align:right">Visits</th></tr>${d.byDevice.map(r=>row(r.name,r.count)).join('')}</table>
    </div>
    <div class="panel">
      <h2>Recent Visits</h2>
      <table><tr><th>Time</th><th>Page</th><th>From</th><th>Device</th></tr>${d.recent.map(r=>`<tr><td>${new Date(r.date).toLocaleString()}</td><td>${r.path}</td><td>${r.referrer}</td><td>${r.device}</td></tr>`).join('')}</table>
    </div>
  `;
  const ctx = document.getElementById('dayChart');
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: d.byDay.map(x=>x.name),
      datasets: [{ label: 'Visits', data: d.byDay.map(x=>x.count), borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,0.15)', tension:0.3, fill:true }]
    },
    options: { plugins:{legend:{display:false}}, scales:{ x:{ ticks:{color:'#888'}, grid:{color:'rgba(255,255,255,0.05)'}}, y:{ ticks:{color:'#888'}, grid:{color:'rgba(255,255,255,0.05)'}}} }
  });
}

// auto-load if key already saved
const saved = localStorage.getItem('erogian_dash_key');
if (saved) load(saved);
</script>
</body>
</html>
