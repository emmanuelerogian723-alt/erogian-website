<!DOCTYPE html>
<html lang="en">
<head>
<meta name="google-site-verification" content="DwCZtKUV6W8t6YC-G-bM1n7yqymmRHp2zUSapUN6th4" />
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Erogian Analytics</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050505;color:#eaeaea;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:30px 20px 80px}
h1{font-size:26px;font-weight:700;margin-bottom:6px;background:linear-gradient(90deg,#3b82f6,#facc15);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{color:#888;font-size:13px;margin-bottom:24px}
.tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
.tab{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#aaa;padding:8px 16px;border-radius:20px;font-size:13px;cursor:pointer}
.tab.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
.section{display:none}
.section.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:26px}
.card{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:18px}
.card .num{font-size:28px;font-weight:800;color:#fff}
.card .label{font-size:12px;color:#999;margin-top:4px}
.panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:20px;margin-bottom:20px}
.panel h2{font-size:15px;margin-bottom:14px;color:#facc15}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:#888;font-weight:600;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.1)}
td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.05);color:#ddd;word-break:break-word}
.pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px}
.pill-green{background:rgba(0,197,110,.15);color:#6ee7a0}
.pill-yellow{background:rgba(250,204,21,.15);color:#facc15}
.pill-blue{background:rgba(59,130,246,.15);color:#93c5fd}
.pill-red{background:rgba(239,68,68,.15);color:#f87171}
.pill-purple{background:rgba(139,92,246,.15);color:#c4b5fd}
.locked{text-align:center;padding-top:120px}
.locked input{background:#111;border:1px solid #333;color:#fff;padding:10px 14px;border-radius:8px;margin-top:14px;width:260px}
.locked button{background:#3b82f6;color:#fff;border:none;padding:10px 18px;border-radius:8px;margin-left:8px;cursor:pointer}
canvas{max-height:220px}
.err{color:#f87171;text-align:center;padding:40px}
.status-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.chat-msg{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
</style>
</head>
<body>
<div id="app" class="wrap">
<div class="locked" id="lockScreen">
<h1>Erogian Analytics</h1>
<p class="sub">Enter your dashboard key to view data</p>
<div><input id="keyInput" type="password" placeholder="dashboard key" /><button onclick="unlock()">View</button></div>
</div>
</div>
<script>
const FN_URL='https://superagent-55bc0d3a.base44.app/functions/getErogianAnalytics';
function unlock(){const key=document.getElementById('keyInput').value.trim();if(!key)return;localStorage.setItem('erogian_dash_key',key);load(key)}
window.addEventListener('DOMContentLoaded',function(){
  var saved=localStorage.getItem('erogian_dash_key');
  if(saved){load(saved);}
});
async function load(key){
const app=document.getElementById('app');
app.innerHTML='<div class="err">Loading...</div>';
try{
const res=await fetch(FN_URL+'?key='+encodeURIComponent(key));
if(res.status===403){app.innerHTML='<div class="locked"><h1>Erogian Analytics</h1><p class="sub" style="color:#f87171">Wrong key. Try again.</p><div><input id="keyInput" type="password" placeholder="dashboard key" /><button onclick="unlock()">View</button></div></div>';return}
const d=await res.json();render(d);
}catch(e){app.innerHTML='<div class="err">Failed to load: '+e+'</div>'}
}
function row(n,c){return '<tr><td>'+n+'</td><td style="text-align:right"><span class="pill pill-blue">'+c+'</span></td></tr>'}
function statusBadge(s){const m={pending:'pill-yellow',confirmed:'pill-green',completed:'pill-blue',cancelled:'pill-red',new:'pill-purple'};return '<span class="status-badge '+(m[s]||'pill-blue')+'">'+s+'</span>'}
function intentBadge(s){const m={pricing:'pill-yellow',payment:'pill-green',contact:'pill-blue',booking:'pill-purple',services:'pill-blue',greeting:'pill-green',fallback:'pill-red'};return '<span class="status-badge '+(m[s]||'pill-blue')+'">'+s+'</span>'}
function payBadge(s){const m={free:'pill-blue',paid:'pill-green',pending:'pill-yellow'};return '<span class="status-badge '+(m[s]||'pill-blue')+'">'+s+'</span>'}
function esc(s){return (s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function switchTab(name){
document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id==='sec-'+name));
}
function render(d){
const app=document.getElementById('app');
const apptCount=d.totalAppointments||0;
const apptByStatus=d.appointmentsByStatus||{};
const chatCount=d.totalChats||0;
const chatsByIntent=d.chatsByIntent||{};
const intentRows=Object.entries(chatsByIntent).sort((a,b)=>b[1]-a[1]).map(([n,c])=>row(n,c)).join('');

const siteSection=
'<div class="grid">'+
'<div class="card"><div class="num">'+d.totalVisits+'</div><div class="label">Page Views</div></div>'+
'<div class="card"><div class="num">'+d.totalLeads+'</div><div class="label">Leads</div></div>'+
'<div class="card"><div class="num">'+apptCount+'</div><div class="label">Appointments</div></div>'+
'<div class="card"><div class="num">'+chatCount+'</div><div class="label">Chat Messages</div></div>'+
'</div>'+
'<div class="panel"><h2>Visits Over Time</h2><canvas id="dayChart"></canvas></div>'+
'<div class="grid" style="margin-bottom:20px">'+
'<div class="card"><div class="num" style="font-size:20px">'+(apptByStatus.pending||0)+'</div><div class="label">Pending Appts</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(apptByStatus.confirmed||0)+'</div><div class="label">Confirmed</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(apptByStatus.completed||0)+'</div><div class="label">Completed</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(apptByStatus.cancelled||0)+'</div><div class="label">Cancelled</div></div>'+
'</div>'+
'<div class="panel"><h2>Upcoming Appointments</h2><table><tr><th>Name</th><th>Service</th><th>Date</th><th>Time</th><th>Phone</th><th>Status</th></tr>'+
(d.upcomingAppointments||[]).map(a=>'<tr><td>'+esc(a.name)+'</td><td>'+esc(a.service)+'</td><td>'+esc(a.date)+'</td><td>'+esc(a.time_slot)+'</td><td>'+esc(a.phone)+'</td><td>'+statusBadge(a.status)+'</td></tr>').join('')+
'</table></div>'+
'<div class="panel"><h2>Chatbot Conversations</h2><table><tr><th>Time</th><th>User Message</th><th>Intent</th><th>Bot Reply</th></tr>'+
(d.recentChats||[]).map(c=>'<tr><td>'+new Date(c.date).toLocaleString()+'</td><td class="chat-msg" title="'+esc(c.user_message)+'">'+esc(c.user_message)+'</td><td>'+intentBadge(c.intent)+'</td><td class="chat-msg" title="'+esc(c.bot_reply)+'">'+esc(c.bot_reply)+'</td></tr>').join('')+
'</table></div>'+
'<div class="panel"><h2>Chat Intents Breakdown</h2><table><tr><th>Intent</th><th style="text-align:right">Count</th></tr>'+intentRows+'</table></div>'+
'<div class="panel"><h2>Recent Leads</h2><table><tr><th>Name</th><th>Service</th><th>Budget</th><th>Email</th><th>Date</th></tr>'+
(d.recentLeads||[]).map(l=>'<tr><td>'+esc(l.name)+'</td><td>'+esc(l.service)+'</td><td>'+esc(l.budget)+'</td><td>'+esc(l.email)+'</td><td>'+new Date(l.date).toLocaleDateString()+'</td></tr>').join('')+
'</table></div>'+
'<div class="panel"><h2>Top Traffic Sources</h2><table><tr><th>Source</th><th style="text-align:right">Visits</th></tr>'+d.byReferrer.slice(0,10).map(r=>row(r.name,r.count)).join('')+'</table></div>'+
'<div class="panel"><h2>Top Pages</h2><table><tr><th>Page</th><th style="text-align:right">Views</th></tr>'+d.byPage.slice(0,10).map(r=>row(r.name,r.count)).join('')+'</table></div>'+
'<div class="panel"><h2>Device Breakdown</h2><table><tr><th>Device</th><th style="text-align:right">Visits</th></tr>'+d.byDevice.map(r=>row(r.name,r.count)).join('')+'</table></div>'+
'<div class="panel"><h2>Recent Visits</h2><table><tr><th>Time</th><th>Page</th><th>From</th><th>Device</th></tr>'+d.recent.map(r=>'<tr><td>'+new Date(r.date).toLocaleString()+'</td><td>'+esc(r.path)+'</td><td>'+esc(r.referrer)+'</td><td>'+esc(r.device)+'</td></tr>').join('')+'</table></div>';

const skillForgeSection=
'<div class="grid">'+
'<div class="card"><div class="num">'+(d.totalStudents||0)+'</div><div class="label">Total Students</div></div>'+
'<div class="card"><div class="num">'+(d.totalCompleted||0)+'</div><div class="label">Completed Courses</div></div>'+
'<div class="card"><div class="num">'+(d.completionRate||0)+'%</div><div class="label">Completion Rate</div></div>'+
'<div class="card"><div class="num">'+(d.avgQuizScore||0)+'%</div><div class="label">Avg Quiz Score</div></div>'+
'</div>'+
'<div class="grid" style="margin-bottom:20px">'+
'<div class="card"><div class="num" style="font-size:20px">'+(d.freeEnrollments||0)+'</div><div class="label">Free Enrollments</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(d.paidEnrollments||0)+'</div><div class="label">Paid Enrollments</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(d.pendingEnrollments||0)+'</div><div class="label">Pending Payment</div></div>'+
'<div class="card"><div class="num" style="font-size:20px">'+(d.publishedCourses||0)+' / '+(d.totalCourses||0)+'</div><div class="label">Published Courses</div></div>'+
'</div>'+
'<div class="panel"><h2>Most Popular Courses</h2><table><tr><th>Course</th><th style="text-align:right">Students</th></tr>'+(d.topCourses||[]).map(r=>row(esc(r.name),r.count)).join('')+'</table></div>'+
'<div class="panel"><h2>Recent Students</h2><table><tr><th>Name</th><th>Email</th><th>Course</th><th>Status</th><th>Quiz Score</th><th>Completed</th><th>Certificate</th><th>Date</th></tr>'+
(d.recentEnrollments||[]).map(e=>'<tr><td>'+esc(e.name)+'</td><td>'+esc(e.email)+'</td><td>'+esc(e.course_title)+'</td><td>'+payBadge(e.payment_status)+'</td><td>'+(e.quiz_total?e.quiz_score+'/'+e.quiz_total:'—')+'</td><td>'+(e.completed?'<span class="status-badge pill-green">Yes</span>':'<span class="status-badge pill-yellow">No</span>')+'</td><td>'+(e.certificate_issued?'<span class="status-badge pill-green">Issued</span>':'—')+'</td><td>'+new Date(e.date).toLocaleDateString()+'</td></tr>').join('')+
'</table></div>';

app.innerHTML='<h1>Erogian Analytics</h1><div class="sub">Live data for erogian website</div>'+
'<div class="tabs">'+
'<div class="tab active" data-tab="site" onclick="switchTab(\'site\')">🌐 Website</div>'+
'<div class="tab" data-tab="skillforge" onclick="switchTab(\'skillforge\')">🎓 SkillForge Students</div>'+
'</div>'+
'<div class="section active" id="sec-site">'+siteSection+'</div>'+
'<div class="section" id="sec-skillforge">'+skillForgeSection+'</div>';

const ctx=document.getElementById('dayChart');
new Chart(ctx,{type:'line',data:{labels:d.byDay.map(x=>x.name),datasets:[{label:'Visits',data:d.byDay.map(x=>x.count),borderColor:'#3b82f6',backgroundColor:'rgba(59,130,246,0.15)',tension:0.3,fill:true}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,0.05)'}},y:{ticks:{color:'#888'},grid:{color:'rgba(255,255,255,0.05)'}}}}});
}
const saved=localStorage.getItem('erogian_dash_key');
if(saved)load(saved);
</script>
</body>
</html>
